apiVersion: v1
kind: Service
metadata:
  name: workflow-agent
spec:
  selector:
    app: workflow-agent
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Secret
metadata:
  name: workflow-agent-secrets
type: Opaque
stringData:
  OPENAI_API_KEY: "replace-me"
  CHROMADB_PATH: "/app/data/chroma"
